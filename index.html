<script>

const generateBtn = document.getElementById('generateBtn');
const categorySelect = document.getElementById('categorySelect');

const loading = document.getElementById('loading');

const storyCard = document.getElementById('storyCard');

const personImage = document.getElementById('personImage');
const personName = document.getElementById('personName');
const personDesc = document.getElementById('personDesc');

const timeline = document.getElementById('timeline');

generateBtn.addEventListener('click', generateStory);

async function generateStory() {

  loading.innerText = "Finding today's legendary personality...";

  storyCard.style.display = 'none';

  try {

    const today = new Date();

    const month = today.getMonth() + 1;
    const day = today.getDate();

    const response = await fetch(
      `https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/births/${month}/${day}`
    );

    const data = await response.json();

    if (!data.births || data.births.length === 0) {
      loading.innerText = "No personalities found today.";
      return;
    }

    const validPeople = data.births.filter(person =>
      person.pages &&
      person.pages.length > 0 &&
      person.pages[0].normalizedtitle
    );

    const category = categorySelect.value;

    let filtered = validPeople.filter(person => {

      const desc =
        (person.pages[0].description || '').toLowerCase();

      switch(category){

        case 'sports':
          return desc.includes('athlete') ||
                 desc.includes('football') ||
                 desc.includes('cricketer') ||
                 desc.includes('player') ||
                 desc.includes('tennis') ||
                 desc.includes('basketball');

        case 'arts':
          return desc.includes('actor') ||
                 desc.includes('actress') ||
                 desc.includes('artist') ||
                 desc.includes('film') ||
                 desc.includes('director');

        case 'politics':
          return desc.includes('politician') ||
                 desc.includes('president') ||
                 desc.includes('prime minister');

        case 'science':
          return desc.includes('scientist') ||
                 desc.includes('physicist') ||
                 desc.includes('inventor') ||
                 desc.includes('mathematician');

        case 'music':
          return desc.includes('musician') ||
                 desc.includes('singer') ||
                 desc.includes('composer') ||
                 desc.includes('drummer');

        default:
          return true;

      }

    });

    // fallback if no matches
    if(filtered.length === 0){
      filtered = validPeople;
    }

    const randomPerson =
      filtered[Math.floor(Math.random() * filtered.length)];

    const title =
      randomPerson.pages[0].normalizedtitle;

    const summaryResponse = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`
    );

    const summaryData = await summaryResponse.json();

    renderStory(summaryData);

  }

  catch(error){

    console.error(error);

    loading.innerText =
      'Something went wrong. Please refresh and try again.';

  }

}

function renderStory(data){

  loading.innerText = '';

  storyCard.style.display = 'block';

  personName.innerText =
    data.title || 'Unknown Personality';

  personDesc.innerText =
    data.description || 'Legendary Personality';

  personImage.src =
    data.thumbnail?.source ||
    'https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png';

  const summary =
    data.extract ||
    'An extraordinary individual whose journey inspired millions.';

  timeline.innerHTML = `

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Early Journey</h3>
      <p>${summary}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Lowest Point</h3>
      <p>${generateLowestPoint(data)}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Perseverance</h3>
      <p>${generatePerseverance(data)}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Highest Point</h3>
      <p>${generateHighestPoint(data)}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Final Insight</h3>
      <p>${generateInsight(data)}</p>
    </div>

  `;

}

function generateLowestPoint(data){

  const desc =
    (data.description || '').toLowerCase();

  if(desc.includes('athlete') ||
     desc.includes('football') ||
     desc.includes('player')){

    return `
    The path to greatness involved pressure, setbacks, competition, and moments where success seemed far away. 
    Physical and mental resilience became essential.
    `;

  }

  if(desc.includes('musician') ||
     desc.includes('singer') ||
     desc.includes('drummer')){

    return `
    Creative careers demanded surviving rejection, uncertainty, and years without recognition while continuing to believe in the craft.
    `;

  }

  if(desc.includes('politician')){

    return `
    Public life brought criticism, scrutiny, and difficult decisions under constant pressure.
    `;

  }

  if(desc.includes('scientist')){

    return `
    Discovery required years of failed experiments, doubt, and intellectual struggle before meaningful breakthroughs emerged.
    `;

  }

  return `
  Every extraordinary life experiences uncertainty, setbacks, and difficult phases before transformation occurs.
  `;

}

function generatePerseverance(data){

  return `
  Despite setbacks, ${data.title} continued moving forward with resilience, consistency, and long-term belief in a greater purpose.
  `;

}

function generateHighestPoint(data){

  return `
  Over time, ${data.title} achieved influence, recognition, and a legacy that inspired people across generations.
  `;

}

function generateInsight(data){

  return `
  The story of ${data.title} reminds us that greatness is rarely instant. 
  Meaningful success grows through courage, discipline, and persistence over time.
  `;

}

</script>
