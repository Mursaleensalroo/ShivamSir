<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Almanac — Born Today</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #f1ebe0;
      --paper-deep: #e8e0d1;
      --ink: #14110d;
      --ink-soft: #2c2620;
      --ink-faded: #6b5f4f;
      --rule: #14110d;
      --accent: #7a1a13;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Crimson Pro', serif;
      padding: 40px 24px 80px;
      min-height: 100vh;
    }

    .sheet {
      max-width: 1100px;
      margin: 0 auto;
    }

    .masthead {
      border-top: 6px double var(--rule);
      border-bottom: 6px double var(--rule);
      padding: 18px 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .masthead .seal {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-style: italic;
      font-weight: 700;
      text-transform: none;
    }

    .masthead .right {
      text-align: right;
    }

    .header {
      text-align: center;
      padding: 60px 0 40px;
      border-bottom: 1px solid var(--rule);
    }

    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .date {
      margin-top: 20px;
      font-size: 28px;
      font-style: italic;
      color: var(--ink-faded);
    }

    .lede {
      max-width: 620px;
      margin: 28px auto 0;
      font-size: 20px;
      line-height: 1.6;
      color: var(--ink-soft);
      font-style: italic;
    }

    .controls {
      padding: 36px 0;
      border-bottom: 1px solid var(--rule);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      align-items: center;
    }

    label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--ink-faded);
    }

    select {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink);
      padding: 8px 4px;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      color: var(--ink);
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-bottom-color: var(--accent);
    }

    button {
      border: none;
      background: var(--ink);
      color: var(--paper);
      padding: 14px 26px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: var(--accent);
    }

    .loading {
      text-align: center;
      padding: 20px;
      font-style: italic;
      color: var(--ink-faded);
      min-height: 30px;
    }

    .entry {
      display: none;
      padding-top: 60px;
      animation: fadeIn 0.5s ease;
    }

    .entry.show {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .entry-head {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 50px;
      margin-bottom: 50px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 40px;
    }

    .portrait img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border: 1px solid var(--ink);
      filter: grayscale(1) contrast(1.05);
    }

    .caption {
      margin-top: 10px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faded);
      font-family: 'JetBrains Mono', monospace;
    }

    .index {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 18px;
    }

    .entry-title h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 6vw, 74px);
      line-height: 0.95;
      margin-bottom: 16px;
    }

    .descriptor {
      font-size: 24px;
      font-style: italic;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    .chapter {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 40px;
      padding: 30px 0;
      border-bottom: 1px solid rgba(20,17,13,0.12);
    }

    .chapter-marker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faded);
    }

    .num {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .chapter-body h3 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 14px;
    }

    .chapter-body p {
      font-size: 19px;
      line-height: 1.7;
      color: var(--ink-soft);
    }

    .ornament {
      text-align: center;
      padding: 50px 0 30px;
      font-size: 22px;
      color: var(--ink-faded);
    }

    .colophon {
      text-align: center;
      padding-top: 30px;
      border-top: 3px double var(--rule);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faded);
    }

    @media(max-width: 768px) {

      .masthead {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .masthead .right {
        text-align: center;
      }

      .entry-head {
        grid-template-columns: 1fr;
      }

      .portrait {
        max-width: 220px;
        margin: 0 auto;
      }

      .chapter {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <main class="sheet">

    <header class="masthead">
      <div>Vol. MMXXVI</div>
      <div class="seal">The Almanac</div>
      <div class="right" id="todayDate"></div>
    </header>

    <section class="header">
      <div class="kicker">— A Daily Record of Lives —</div>

      <h1>Born <em>Today</em></h1>

      <div class="date" id="prettyDate"></div>

      <p class="lede">
        Each day, the past returns a name. A life lived elsewhere in time, recovered briefly and read by you.
      </p>
    </section>

    <section class="controls">

      <div>
        <label>Field</label>
        <br>
        <select id="category">
          <option value="sports">Sport & Athletics</option>
          <option value="arts">Arts & Letters</option>
          <option value="politics">Politics & Statecraft</option>
          <option value="science">Science & Discovery</option>
          <option value="music">Music & Composition</option>
        </select>
      </div>

      <button id="btn">
        Reveal Today's Legend
      </button>

    </section>

    <div class="loading" id="loading"></div>

    <article class="entry" id="entry">

      <div class="entry-head">

        <div class="portrait">
          <img id="image" src="" alt="">
          <div class="caption" id="caption"></div>
        </div>

        <div class="entry-title">
          <div class="index" id="indexLine"></div>

          <h2 id="name"></h2>

          <p class="descriptor" id="desc"></p>
        </div>

      </div>

      <div id="chapters"></div>

      <div class="ornament">❦ ❦ ❦</div>

      <div class="colophon">
        Set in Playfair Display & Crimson Pro · Drawn from the open record
      </div>

    </article>

  </main>

  <script>

    const btn = document.getElementById('btn');
    const category = document.getElementById('category');
    const loading = document.getElementById('loading');
    const entry = document.getElementById('entry');

    const image = document.getElementById('image');
    const nameEl = document.getElementById('name');
    const descEl = document.getElementById('desc');
    const chapters = document.getElementById('chapters');
    const indexLine = document.getElementById('indexLine');

    const CATEGORY_KEYWORDS = {
      sports: ['athlete', 'football', 'cricketer', 'player', 'tennis', 'basketball'],
      arts: ['actor', 'artist', 'writer', 'poet', 'director'],
      politics: ['politician', 'president', 'prime minister'],
      science: ['scientist', 'physicist', 'inventor', 'chemist'],
      music: ['musician', 'singer', 'composer']
    };

    /* DATE */

    (function () {

      const d = new Date();

      const months = [
        'January','February','March','April','May','June',
        'July','August','September','October','November','December'
      ];

      document.getElementById('prettyDate').textContent =
        `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

      document.getElementById('todayDate').textContent =
        d.toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'short',
          day: 'numeric'
        });

    })();

    btn.addEventListener('click', generateStory);

    async function generateStory() {

      loading.innerText = 'Consulting the archive…';

      entry.classList.remove('show');

      try {

        const today = new Date();

        const month = today.getMonth() + 1;
        const day = today.getDate();

        const res = await fetch(
          `https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/births/${month}/${day}`
        );

        if (!res.ok) {
          throw new Error('Birth API failed');
        }

        const data = await res.json();

        const births = Array.isArray(data.births)
          ? data.births
          : [];

        const valid = births.filter(p =>
          p &&
          p.pages &&
          p.pages.length &&
          p.pages[0] &&
          p.pages[0].normalizedtitle
        );

        if (!valid.length) {
          throw new Error('No valid entries');
        }

        const keywords = CATEGORY_KEYWORDS[category.value] || [];

        let pool = valid.filter(p => {

          const desc = (
            p.pages[0].description || ''
          ).toLowerCase();

          return keywords.some(k => desc.includes(k));

        });

        if (!pool.length) {
          pool = valid;
        }

        const pick =
          pool[Math.floor(Math.random() * pool.length)];

        const title = pick.pages[0].normalizedtitle;

        const birthYear = pick.year;

        const wikiRes = await fetch(
          `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`
        );

        if (!wikiRes.ok) {
          throw new Error('Summary fetch failed');
        }

        const person = await wikiRes.json();

        if (!person || !person.title) {
          throw new Error('Invalid summary');
        }

        person._birthYear = birthYear;

        render(person);

      } catch (err) {

        console.error(err);

        loading.innerText =
          'Could not retrieve a complete archive entry. Try again.';
      }
    }

    function render(person) {

      loading.innerText = '';

      entry.classList.add('show');

      const name = person.title || 'Unknown';

      nameEl.innerText = name;

      descEl.innerText =
        person.description || 'A life of consequence';

      image.src =
        (person.thumbnail && person.thumbnail.source)
          ? person.thumbnail.source
          : 'https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png';

      image.alt = name;

      const yr = person._birthYear;

      document.getElementById('caption').innerText =
        yr ? `Portrait · b. ${yr}` : 'Portrait';

      indexLine.innerText =
        `Entry № ${Math.floor(Math.random() * 900 + 100)} · Born ${yr}`;

      const summary =
        person.extract ||
        'The archive preserves only fragments.';

      const sections = [

        ['I', 'The Record', summary],

        ['II', 'The Lowest Point',
          `${name} endured periods of uncertainty, obscurity, rejection, and personal difficulty before the world knew the name.`],

        ['III', 'The Persistence',
          `Long before recognition, ${name} continued through repetition, discipline, and years where progress was invisible.`],

        ['IV', 'The Highest Point',
          `Eventually, the work resonated beyond the individual. Recognition transformed the name into something larger than a single life.`],

        ['V', 'The Legacy',
          `What survives is not merely accomplishment, but influence — the people inspired by ${name} to attempt greatness themselves.`]

      ];

      chapters.innerHTML = sections.map(([num, title, text]) => `

        <div class="chapter">

          <div class="chapter-marker">
            <span class="num">${num}</span>
            Chapter
          </div>

          <div class="chapter-body">
            <h3>${title}</h3>
            <p>${text}</p>
          </div>

        </div>

      `).join('');

    }

  </script>

</body>
</html>
