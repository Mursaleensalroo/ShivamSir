<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Born Today — Inspirational Stories</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 30px;
    }

    .background-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      background: rgba(59,130,246,0.15);
      border-radius: 50%;
      filter: blur(120px);
      top: -150px;
      right: -100px;
      z-index: 0;
    }

    .container {
      max-width: 950px;
      margin: auto;
      position: relative;
      z-index: 2;
    }

    .hero {
      text-align: center;
      margin-top: 50px;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #93c5fd;
      padding: 10px 18px;
      border-radius: 999px;
      margin-bottom: 25px;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: clamp(3rem, 6vw, 5rem);
      line-height: 1.05;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .gradient {
      background: linear-gradient(90deg, #60a5fa, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #cbd5e1;
      max-width: 700px;
      margin: auto;
      line-height: 1.8;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .cta-button {
      border: none;
      padding: 16px 28px;
      border-radius: 18px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 15px 40px rgba(37,99,235,0.3);
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 50px rgba(37,99,235,0.45);
    }

    .loading {
      margin-top: 20px;
      color: #93c5fd;
      font-size: 1rem;
    }

    .story-card {
      display: none;
      margin-top: 40px;
      background: rgba(15,23,42,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 40px;
      backdrop-filter: blur(20px);
      animation: fadeIn 0.7s ease;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile {
      text-align: center;
      margin-bottom: 40px;
    }

    .profile img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }

    .profile h2 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .profile p {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    .timeline {
      position: relative;
      margin-top: 20px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 0;
      width: 2px;
      height: 100%;
      background: rgba(255,255,255,0.08);
    }

    .timeline-item {
      position: relative;
      padding-left: 55px;
      margin-bottom: 40px;
    }

    .timeline-dot {
      position: absolute;
      left: 0;
      top: 5px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 0 20px rgba(59,130,246,0.5);
    }

    .timeline-item h3 {
      color: #93c5fd;
      font-size: 1.6rem;
      margin-bottom: 15px;
    }

    .timeline-item p {
      color: #d1d5db;
      line-height: 1.9;
      font-size: 1.08rem;
    }

    .footer-note {
      margin-top: 30px;
      text-align: center;
      color: #64748b;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {

      body {
        padding: 20px;
      }

      .story-card {
        padding: 25px;
      }

      .profile h2 {
        font-size: 2.2rem;
      }

      .timeline-item {
        padding-left: 42px;
      }

      .timeline-item h3 {
        font-size: 1.3rem;
      }

    }

  </style>
</head>

<body>

  <div class="background-glow"></div>

  <div class="container">

    <div class="hero">

      <div class="badge">
        ✨ Daily Inspirational Biography
      </div>

      <h1>
        Born <span class="gradient">Today</span>
      </h1>

      <p class="subtitle">
        Discover a legendary personality born on this day and explore their journey through struggle, perseverance, and impact.
      </p>

      <button class="cta-button" id="generateBtn">
        Reveal Today's Story
      </button>

      <div class="loading" id="loading"></div>

    </div>

    <div class="story-card" id="storyCard">

      <div class="profile">
        <img id="personImage" src="" alt="">
        <h2 id="personName"></h2>
        <p id="personDesc"></p>
      </div>

      <div class="timeline" id="storyTimeline"></div>

      <div class="footer-note">
        Every extraordinary life begins with ordinary moments.
      </div>

    </div>

  </div>

  <script>

    const generateBtn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');

    const storyCard = document.getElementById('storyCard');
    const personImage = document.getElementById('personImage');
    const personName = document.getElementById('personName');
    const personDesc = document.getElementById('personDesc');
    const storyTimeline = document.getElementById('storyTimeline');

    generateBtn.addEventListener('click', generateStory);

    async function generateStory() {

      loading.innerText = 'Finding an inspiring personality born today...';

      storyCard.style.display = 'none';

      try {

        const today = new Date();

        const month = today.getMonth() + 1;
        const day = today.getDate();

        const response = await fetch(
          `https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/births/${month}/${day}`
        );

        const data = await response.json();

        const validPeople = data.births.filter(person =>
          person.pages && person.pages.length > 0
        );

        const randomPerson =
          validPeople[Math.floor(Math.random() * validPeople.length)];

        const page = randomPerson.pages[0];

        const summaryResponse = await fetch(
          `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(page.normalizedtitle)}`
        );

        const summaryData = await summaryResponse.json();

        renderStory(summaryData);

      } catch (error) {

        console.error(error);

        loading.innerText =
          'Something went wrong. Please try again.';

      }

    }

    function renderStory(data) {

      loading.innerText = '';

      storyCard.style.display = 'block';

      personName.innerText =
        data.title || 'Unknown Personality';

      personDesc.innerText =
        data.description || 'Legendary personality';

      personImage.src =
        data.thumbnail?.source ||
        'https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png';

      const summary =
        data.extract ||
        'An inspiring individual whose journey impacted the world.';

      const birthSection = `
        ${summary}
      `;

      const struggleSection = generateStruggle(data);

      const perseveranceSection = generatePerseverance(data);

      const insightSection = generateInsight(data);

      storyTimeline.innerHTML = `

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <h3>Birth & Early Life</h3>
          <p>${birthSection}</p>
        </div>

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <h3>Struggles</h3>
          <p>${struggleSection}</p>
        </div>

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <h3>Perseverance</h3>
          <p>${perseveranceSection}</p>
        </div>

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <h3>Final Insight</h3>
          <p>${insightSection}</p>
        </div>

      `;

    }

    function generateStruggle(data) {

      const desc = (data.description || '').toLowerCase();

      if (desc.includes('musician') || desc.includes('drummer') || desc.includes('singer')) {

        return `
        Before recognition came years of uncertainty, creative pressure, and fierce competition. 
        Building a career in music required persistence, experimentation, and surviving an industry where very few succeed.
        `;

      }

      if (desc.includes('actor') || desc.includes('actress')) {

        return `
        Behind fame were countless auditions, rejection, and pressure to continuously prove talent. 
        The entertainment world demanded resilience and the ability to keep going despite setbacks.
        `;

      }

      if (desc.includes('scientist')) {

        return `
        Scientific achievement often comes through years of failure, experimentation, and doubt. 
        Progress required patience, curiosity, and relentless dedication to discovery.
        `;

      }

      if (desc.includes('politician')) {

        return `
        Leadership brought criticism, pressure, and difficult decisions. 
        The journey demanded emotional resilience and the strength to navigate constant public scrutiny.
        `;

      }

      if (desc.includes('athlete') || desc.includes('football') || desc.includes('cricketer')) {

        return `
        Athletic greatness required discipline, sacrifice, and years of relentless practice. 
        Injuries, setbacks, and competition tested both physical and mental strength.
        `;

      }

      return `
      Every meaningful journey contains moments of uncertainty and struggle. 
      Difficult experiences became the foundation for resilience, wisdom, and growth.
      `;

    }

    function generatePerseverance(data) {

      const name = data.title;

      return `
      Despite obstacles, ${name} continued forward with consistency and determination. 
      Over time, persistence transformed effort into lasting impact and recognition.
      `;

    }

    function generateInsight(data) {

      const name = data.title;

      return `
      The story of ${name} reminds us that success is rarely immediate. 
      Meaningful impact is built through patience, resilience, discipline, and the courage to continue despite uncertainty.
      `;

    }

    // Auto load on startup
    generateStory();

  </script>

</body>
</html>
