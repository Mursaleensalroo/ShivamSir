<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Almanac — Born Today</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #f1ebe0;
      --paper-deep: #e8e0d1;
      --ink: #14110d;
      --ink-soft: #2c2620;
      --ink-faded: #6b5f4f;
      --rule: #14110d;
      --accent: #7a1a13;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background:
        radial-gradient(ellipse at top, rgba(122,26,19,0.04), transparent 60%),
        var(--paper);
      color: var(--ink);
      font-family: 'Crimson Pro', serif;
      padding: 40px 24px 80px;
      min-height: 100vh;
    }

    .sheet { max-width: 1100px; margin: 0 auto; }

    .masthead {
      border-top: 6px double var(--rule);
      border-bottom: 6px double var(--rule);
      padding: 18px 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .masthead .seal {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-style: italic;
      font-weight: 700;
      text-transform: none;
    }

    .masthead .right { text-align: right; }

    .header {
      text-align: center;
      padding: 60px 0 40px;
      border-bottom: 1px solid var(--rule);
    }

    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .date {
      margin-top: 20px;
      font-size: 28px;
      font-style: italic;
      color: var(--ink-faded);
    }

    .lede {
      max-width: 620px;
      margin: 28px auto 0;
      font-size: 20px;
      line-height: 1.6;
      color: var(--ink-soft);
      font-style: italic;
    }

    .controls {
      padding: 36px 0;
      border-bottom: 1px solid var(--rule);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      align-items: flex-end;
    }

    label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--ink-faded);
    }

    select {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--ink);
      padding: 8px 4px;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      color: var(--ink);
      cursor: pointer;
      margin-top: 6px;
    }

    select:focus {
      outline: none;
      border-bottom-color: var(--accent);
    }

    button {
      border: none;
      background: var(--ink);
      color: var(--paper);
      padding: 14px 26px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover:not(:disabled) { background: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 20px;
      font-style: italic;
      color: var(--ink-faded);
      min-height: 30px;
      font-size: 18px;
    }

    .loading.active::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-left: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    .entry {
      display: none;
      padding-top: 60px;
      animation: fadeIn 0.6s ease;
    }

    .entry.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-head {
      gap: 28px;
      margin-bottom: 50px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 40px;
      text-align: center;
    }

    .index {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 18px;
    }

    .entry-title h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 7vw, 88px);
      line-height: 0.95;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .descriptor {
      font-size: 24px;
      font-style: italic;
      color: var(--ink-soft);
      line-height: 1.5;
      max-width: 720px;
      margin: 0 auto;
    }

    .lifespan {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-faded);
      margin-top: 20px;
    }

    .lifespan span { color: var(--accent); }

    .chapter {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 40px;
      padding: 36px 0;
      border-bottom: 1px solid rgba(20,17,13,0.12);
    }

    .chapter-marker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faded);
    }

    .num {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 10px;
      line-height: 1;
    }

    .chapter-body h3 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 14px;
      line-height: 1.15;
    }

    .chapter-body p {
      font-size: 19px;
      line-height: 1.75;
      color: var(--ink-soft);
    }

    .chapter-body p + p { margin-top: 14px; }

    .pullquote {
      border-left: 3px solid var(--accent);
      padding: 4px 0 4px 20px;
      margin: 30px 0 10px;
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      line-height: 1.5;
    }

    .pullquote .attr {
      display: block;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-style: normal;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faded);
    }

    .ornament {
      text-align: center;
      padding: 50px 0 30px;
      font-size: 22px;
      color: var(--ink-faded);
      letter-spacing: 0.6em;
    }

    .colophon {
      text-align: center;
      padding-top: 30px;
      border-top: 3px double var(--rule);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faded);
    }

    @media(max-width: 768px) {
      .masthead { grid-template-columns: 1fr; text-align: center; }
      .masthead .right { text-align: center; }
      .chapter { grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>

<body>

  <main class="sheet">

    <header class="masthead">
      <div>Vol. MMXXVI</div>
      <div class="seal">The Almanac</div>
      <div class="right" id="todayDate"></div>
    </header>

    <section class="header">
      <div class="kicker">— A Daily Record of Lives —</div>
      <h1>Born <em>Today</em></h1>
      <div class="date" id="prettyDate"></div>
      <p class="lede">
        Each day, the past returns a name. A life lived elsewhere in time, recovered briefly and read by you.
      </p>
    </section>

    <section class="controls">
      <div>
        <label>Field</label><br>
        <select id="category">
          <option value="Sport &amp; Athletics">Sport &amp; Athletics</option>
          <option value="Arts &amp; Letters">Arts &amp; Letters</option>
          <option value="Politics &amp; Statecraft">Politics &amp; Statecraft</option>
          <option value="Science &amp; Discovery">Science &amp; Discovery</option>
          <option value="Music &amp; Composition">Music &amp; Composition</option>
        </select>
      </div>
      <button id="btn">Reveal Today's Legend</button>
    </section>

    <div class="loading" id="loading"></div>

    <article class="entry" id="entry">

      <div class="entry-head">
        <div class="entry-title">
          <div class="index" id="indexLine"></div>
          <h2 id="name"></h2>
          <p class="descriptor" id="desc"></p>
          <div class="lifespan" id="lifespan"></div>
        </div>
      </div>

      <div id="chapters"></div>

      <div class="ornament">❦</div>

      <div class="colophon">
        Set in Playfair Display &amp; Crimson Pro · Composed by Claude from the open record
      </div>

    </article>

  </main>

  <script>
    const btn       = document.getElementById('btn');
    const category  = document.getElementById('category');
    const loading   = document.getElementById('loading');
    const entry     = document.getElementById('entry');
    const nameEl    = document.getElementById('name');
    const descEl    = document.getElementById('desc');
    const chapters  = document.getElementById('chapters');
    const indexLine = document.getElementById('indexLine');
    const lifespan  = document.getElementById('lifespan');

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const today = new Date();
    const todayMonth = MONTHS[today.getMonth()];
    const todayDay = today.getDate();
    const todayYear = today.getFullYear();

    document.getElementById('prettyDate').textContent =
      `${todayMonth} ${todayDay}, ${todayYear}`;
    document.getElementById('todayDate').textContent =
      today.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

    btn.addEventListener('click', generateStory);

    function setLoading(msg) {
      loading.innerText = msg || '';
      loading.classList.toggle('active', !!msg);
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function generateStory() {
      btn.disabled = true;
      setLoading('Consulting the archive');
      entry.classList.remove('show');
      resetEntry();

      const field = category.value.replace(/&amp;/g, '&');
      const seed = Math.floor(Math.random() * 10000);

      try {
        const apiRes = await fetch("/api/almanac", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ field, month: todayMonth, day: todayDay, seed })
        });

        if (!apiRes.ok) {
          const errBody = await apiRes.json().catch(() => ({}));
          throw new Error(errBody.error || `Proxy ${apiRes.status}`);
        }

        setLoading('Composing the entry');

        const apiData = await apiRes.json();
        const fullText = (apiData.text || '').trim();

        if (!fullText) throw new Error('Empty response');

        const cleaned = fullText.replace(/```json\s*|```\s*/g, '').trim();
        const match = cleaned.match(/\{[\s\S]*\}/);
        if (!match) throw new Error('No JSON found');

        let parsed;
        try { parsed = JSON.parse(match[0]); }
        catch (_) { throw new Error('Malformed JSON'); }

        if (!parsed.name || !Array.isArray(parsed.chapters) || !parsed.chapters.length) {
          throw new Error('Incomplete entry');
        }

        render(parsed);
        entry.classList.add('show');
        setLoading('');

      } catch (err) {
        console.error(err);
        const msg = (err && err.message) ? err.message : 'unknown error';
        setLoading(`Could not retrieve an entry (${msg}). Try again.`);
      } finally {
        btn.disabled = false;
      }
    }

    function resetEntry() {
      nameEl.innerText = '';
      descEl.innerText = '';
      lifespan.innerHTML = '';
      indexLine.innerText = '';
      chapters.innerHTML = '';
    }

    function render(data) {
      nameEl.innerText = data.name;
      descEl.innerText = data.descriptor || '';

      const by = data.birth_year, dy = data.death_year;
      indexLine.innerText = `Entry № ${Math.floor(Math.random() * 900 + 100)} · ${todayMonth} ${todayDay}${by ? ', ' + by : ''}`;

      if (by && dy) {
        lifespan.innerHTML = `b. <span>${by}</span> &nbsp;·&nbsp; d. <span>${dy}</span> &nbsp;·&nbsp; <span>${dy - by}</span> years`;
      } else if (by) {
        lifespan.innerHTML = `b. <span>${by}</span>`;
      } else {
        lifespan.innerHTML = '';
      }

      const roman = ['I','II','III','IV','V','VI','VII'];
      const chs = data.chapters.slice(0, 5);
      const pullIndex = Math.min(2, chs.length - 1);

      chapters.innerHTML = chs.map((c, i) => `
        <div class="chapter">
          <div class="chapter-marker">
            <span class="num">${roman[i]}</span>
            Chapter
          </div>
          <div class="chapter-body">
            <h3>${escapeHtml(c.title)}</h3>
            <p>${escapeHtml(c.body)}</p>
            ${
              i === pullIndex && data.pullquote && data.pullquote.text
                ? `<div class="pullquote">${escapeHtml(data.pullquote.text)}<span class="attr">${escapeHtml(data.pullquote.attribution || 'On the record')}</span></div>`
                : ''
            }
          </div>
        </div>
      `).join('');
    }
  </script>

</body>
</html>
