<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Born Today — Legendary Journeys</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a);
      color:white;
      min-height:100vh;
      overflow-x:hidden;
      padding:30px;
    }

    .bg-glow{
      position:fixed;
      width:500px;
      height:500px;
      background:rgba(59,130,246,0.15);
      border-radius:50%;
      filter:blur(120px);
      top:-120px;
      right:-100px;
      z-index:0;
    }

    .container{
      max-width:1000px;
      margin:auto;
      position:relative;
      z-index:2;
    }

    .hero{
      text-align:center;
      margin-top:40px;
      margin-bottom:40px;
    }

    .badge{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      color:#93c5fd;
      margin-bottom:25px;
      font-size:0.9rem;
      backdrop-filter:blur(10px);
    }

    h1{
      font-size:clamp(3rem,6vw,5rem);
      line-height:1.05;
      font-weight:800;
      margin-bottom:20px;
    }

    .gradient{
      background:linear-gradient(90deg,#60a5fa,#8b5cf6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      max-width:720px;
      margin:auto;
      line-height:1.8;
      color:#cbd5e1;
      font-size:1.1rem;
      margin-bottom:35px;
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    select{
      padding:15px 18px;
      border-radius:16px;
      border:none;
      background:#111827;
      color:white;
      font-size:1rem;
      min-width:240px;
      outline:none;
      border:1px solid rgba(255,255,255,0.08);
    }

    button{
      border:none;
      padding:15px 28px;
      border-radius:18px;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s ease;
      box-shadow:0 15px 40px rgba(37,99,235,0.3);
    }

    button:hover{
      transform:translateY(-3px);
    }

    .loading{
      margin-top:20px;
      color:#93c5fd;
      text-align:center;
      min-height:24px;
    }

    .story-card{
      display:none;
      margin-top:40px;
      background:rgba(15,23,42,0.75);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:30px;
      padding:40px;
      backdrop-filter:blur(20px);
      box-shadow:0 25px 60px rgba(0,0,0,0.45);
      animation:fadeIn 0.7s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .profile{
      text-align:center;
      margin-bottom:40px;
    }

    .profile img{
      width:160px;
      height:160px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid rgba(255,255,255,0.1);
      margin-bottom:20px;
    }

    .profile h2{
      font-size:3rem;
      margin-bottom:10px;
    }

    .profile p{
      color:#94a3b8;
      font-size:1.1rem;
    }

    .timeline{
      position:relative;
      margin-top:30px;
    }

    .timeline::before{
      content:'';
      position:absolute;
      left:12px;
      top:0;
      width:2px;
      height:100%;
      background:rgba(255,255,255,0.08);
    }

    .timeline-item{
      position:relative;
      padding-left:55px;
      margin-bottom:40px;
    }

    .dot{
      position:absolute;
      left:0;
      top:5px;
      width:24px;
      height:24px;
      border-radius:50%;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      box-shadow:0 0 20px rgba(59,130,246,0.5);
    }

    .timeline-item h3{
      color:#93c5fd;
      font-size:1.5rem;
      margin-bottom:14px;
    }

    .timeline-item p{
      color:#d1d5db;
      line-height:1.9;
      font-size:1.08rem;
    }

    .footer{
      text-align:center;
      margin-top:30px;
      color:#64748b;
      font-size:0.95rem;
    }

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .story-card{
        padding:24px;
      }

      .profile h2{
        font-size:2.1rem;
      }

      .timeline-item{
        padding-left:42px;
      }

      .controls{
        flex-direction:column;
      }

      select,button{
        width:100%;
      }

    }

  </style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

  <div class="hero">

    <div class="badge">
      ✨ Legendary Lives • Daily Inspiration
    </div>

    <h1>
      Born <span class="gradient">Today</span>
    </h1>

    <p class="subtitle">
      Discover influential personalities born on this day. 
      Explore their lowest moments, perseverance, breakthroughs, and lasting legacy.
    </p>

    <div class="controls">

      <select id="categorySelect">

        <option value="sports">🏆 Sports</option>
        <option value="arts">🎨 Arts & Entertainment</option>
        <option value="politics">🏛 Politics</option>
        <option value="science">🧪 Science</option>
        <option value="music">🎵 Music</option>

      </select>

      <button id="generateBtn">
        Reveal Today's Legend
      </button>

    </div>

    <div class="loading" id="loading"></div>

  </div>

  <div class="story-card" id="storyCard">

    <div class="profile">

      <img id="personImage" src="" alt="">

      <h2 id="personName"></h2>

      <p id="personDesc"></p>

    </div>

    <div class="timeline" id="timeline"></div>

    <div class="footer">
      Every legendary life contains struggle, uncertainty, and transformation.
    </div>

  </div>

</div>

<script>

const generateBtn = document.getElementById('generateBtn');
const categorySelect = document.getElementById('categorySelect');

const loading = document.getElementById('loading');

const storyCard = document.getElementById('storyCard');

const personImage = document.getElementById('personImage');
const personName = document.getElementById('personName');
const personDesc = document.getElementById('personDesc');

const timeline = document.getElementById('timeline');

generateBtn.addEventListener('click', generateStory);

async function generateStory(){

  loading.innerText = 'Finding today\\'s legendary personality...';

  storyCard.style.display = 'none';

  try{

    const today = new Date();

    const month = today.getMonth() + 1;
    const day = today.getDate();

    const response = await fetch(
      `https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/births/${month}/${day}`
    );

    const data = await response.json();

    const validPeople = data.births.filter(
      p => p.pages && p.pages.length > 0
    );

    const category = categorySelect.value;

    const filtered = validPeople.filter(person => {

      const pageData = person.pages[0];

      const desc =
        (pageData.description || '').toLowerCase();

      if(category === 'sports'){
        return desc.includes('football') ||
               desc.includes('athlete') ||
               desc.includes('cricketer') ||
               desc.includes('basketball') ||
               desc.includes('player') ||
               desc.includes('tennis');
      }

      if(category === 'arts'){
        return desc.includes('actor') ||
               desc.includes('actress') ||
               desc.includes('artist') ||
               desc.includes('film') ||
               desc.includes('director');
      }

      if(category === 'politics'){
        return desc.includes('politician') ||
               desc.includes('president') ||
               desc.includes('prime minister');
      }

      if(category === 'science'){
        return desc.includes('scientist') ||
               desc.includes('physicist') ||
               desc.includes('inventor') ||
               desc.includes('mathematician');
      }

      if(category === 'music'){
        return desc.includes('musician') ||
               desc.includes('singer') ||
               desc.includes('composer') ||
               desc.includes('drummer');
      }

      return false;

    });

    if(filtered.length === 0){

      loading.innerText =
        'No personality found in this category for today. Try another field.';

      return;
    }

    const person =
      filtered[Math.floor(Math.random() * filtered.length)];

    const page = person.pages[0];

    const summaryResponse = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(page.normalizedtitle)}`
    );

    const summaryData = await summaryResponse.json();

    renderStory(summaryData);

  }

  catch(error){

    console.error(error);

    loading.innerText =
      'Something went wrong. Please try again.';

  }

}

function renderStory(data){

  loading.innerText = '';

  storyCard.style.display = 'block';

  personName.innerText =
    data.title || 'Unknown Personality';

  personDesc.innerText =
    data.description || 'Legendary personality';

  personImage.src =
    data.thumbnail?.source ||
    'https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png';

  const summary =
    data.extract ||
    'An extraordinary individual whose life impacted millions.';

  const lowestPoint =
    generateLowestPoint(data);

  const perseverance =
    generatePerseverance(data);

  const highestPoint =
    generateHighestPoint(data);

  const insight =
    generateInsight(data);

  timeline.innerHTML = `

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Early Journey</h3>
      <p>${summary}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Lowest Point</h3>
      <p>${lowestPoint}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Perseverance</h3>
      <p>${perseverance}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Highest Point</h3>
      <p>${highestPoint}</p>
    </div>

    <div class="timeline-item">
      <div class="dot"></div>
      <h3>Final Insight</h3>
      <p>${insight}</p>
    </div>

  `;

}

function generateLowestPoint(data){

  const desc =
    (data.description || '').toLowerCase();

  if(desc.includes('athlete') ||
     desc.includes('football') ||
     desc.includes('cricketer') ||
     desc.includes('player')){

    return `
    Behind achievements were exhausting years of training, pressure, setbacks, and moments where failure seemed unavoidable. 
    Injuries, criticism, and competition tested both physical and mental resilience.
    `;

  }

  if(desc.includes('musician') ||
     desc.includes('singer') ||
     desc.includes('drummer') ||
     desc.includes('composer')){

    return `
    The creative journey was filled with uncertainty, rejection, financial instability, and the struggle to stand out in an intensely competitive industry.
    `;

  }

  if(desc.includes('politician') ||
     desc.includes('president')){

    return `
    Leadership brought criticism, controversy, and immense public pressure. 
    Difficult decisions and constant scrutiny defined the hardest phases of the journey.
    `;

  }

  if(desc.includes('scientist') ||
     desc.includes('physicist') ||
     desc.includes('inventor')){

    return `
    Progress required years of failed experiments, doubt, and intellectual struggle before breakthroughs finally emerged.
    `;

  }

  return `
  Every transformative life experiences uncertainty, failure, and difficult moments before success becomes visible.
  `;

}

function generatePerseverance(data){

  const name = data.title;

  return `
  Despite setbacks, ${name} continued forward with resilience, consistency, and long-term belief in a larger purpose. 
  Persistence transformed obstacles into momentum and growth.
  `;

}

function generateHighestPoint(data){

  const name = data.title;

  return `
  Over time, ${name} achieved recognition, influence, and lasting impact. 
  Their work inspired people across generations and established a legacy remembered far beyond their own era.
  `;

}

function generateInsight(data){

  const name = data.title;

  return `
  The life of ${name} reminds us that greatness is rarely immediate. 
  Success grows quietly through discipline, courage, resilience, and the willingness to continue despite uncertainty.
  `;

}

</script>

</body>
</html>
